name: Release

# Builds an UNSIGNED ReportMate-<version>.pkg and publishes it as a GitHub
# release. ECU's Apple Developer ID material is intentionally NOT held here:
# the pkg ships unsigned and is signed + notarized downstream by the Munki
# bootstrap pipeline (Azure DevOps), mirroring how reportmate-client-win ships
# unsigned and is signed by the Cimian pipeline.

on:
  push:
    tags:
      - 'v*'
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9][0-9][0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (leave empty for auto YYYY.MM.DD.HHMM)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # build.sh derives per-module versions from git history.
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      # Decide what to hand build.sh: a YYYY.MM.DD.HHMM version (from the tag or
      # the manual input) if it's well-formed, otherwise nothing so build.sh
      # auto-generates one.
      - name: Resolve version arg
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          if printf '%s' "$VERSION" | grep -Eq '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{4}$'; then
            echo "arg=--version $VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "arg=" >> "$GITHUB_OUTPUT"
          fi

      # build.sh's shebang is #!/opt/homebrew/bin/bash (bash 5). The runner ships
      # only system bash 3.2, so install the Homebrew bash the script expects.
      - name: Install bash 5
        run: brew list bash >/dev/null 2>&1 || brew install bash

      - name: Build unsigned pkg
        run: ./build.sh ${{ steps.resolve.outputs.arg }} --skip-zip --skip-dmg

      - name: Capture build info
        id: info
        run: |
          set -euo pipefail
          PKG=$(ls -1 release/ReportMate-*.pkg 2>/dev/null | head -1)
          [ -n "$PKG" ] || { echo "No pkg produced by build.sh"; exit 1; }
          BASE=$(basename "$PKG")
          if ! printf '%s' "$BASE" | grep -Eq '^ReportMate-[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{4}\.pkg$'; then
            echo "Unexpected pkg name: $BASE"; exit 1
          fi
          VERSION=$(printf '%s' "$BASE" | sed -E 's/^ReportMate-(.+)\.pkg$/\1/')
          ( cd release && shasum -a 256 "$BASE" > "$BASE.sha256" )
          {
            echo "version=$VERSION"
            echo "swift=$(swift --version 2>&1 | head -1)"
            echo "os=$(sw_vers -productName) $(sw_vers -productVersion)"
          } >> "$GITHUB_OUTPUT"

      - name: List release artifacts
        run: ls -lh release/ReportMate-*.pkg release/ReportMate-*.pkg.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.info.outputs.version }}
          SWIFT: ${{ steps.info.outputs.swift }}
          OS: ${{ steps.info.outputs.os }}
        run: |
          set -euo pipefail

          # On a tag push the tag already exists; on a manual run create it at
          # the built commit so the release has something to hang off.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$VERSION"
          else
            TAG="$REF_NAME"
          fi

          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          AUTO_NOTES=$(gh api -X POST "repos/$GITHUB_REPOSITORY/releases/generate-notes" -f tag_name="$TAG" --jq .body)

          # Assemble notes line-by-line. printf '%s\n' keeps each literal arg
          # verbatim (backticks/backslashes intact) and every line stays
          # indented inside the YAML block scalar -- a heredoc body cannot.
          NOTES_FILE="$RUNNER_TEMP/notes.md"
          {
            printf '## Build info\n\n'
            printf 'Built with %s on %s, via %s. Provided **unsigned** -- see signing instructions at the bottom.\n\n' \
              "$SWIFT" "$OS" "$RUN_URL"
            printf '%s\n\n' "$AUTO_NOTES"
            printf '%s\n' '## Signing for enterprise deployment'
            printf '%s\n' ''
            printf '%s\n' "The pkg ships unsigned. Sign and notarize it with your organization's Apple"
            printf '%s\n' 'Developer ID before distribution (this is what the Munki bootstrap pipeline'
            printf '%s\n' 'does automatically):'
            printf '%s\n' ''
            printf '%s\n' '```bash'
            printf '%s\n' 'codesign --force --options runtime --timestamp \'
            printf '%s\n' '  --sign "Developer ID Application: <Org> (<TeamID>)" \'
            printf '%s\n' '  /Applications/Utilities/ReportMate.app'
            printf '%s\n' ''
            printf '%s\n' 'productsign --timestamp \'
            printf '%s\n' '  --sign "Developer ID Installer: <Org> (<TeamID>)" \'
            printf '%s\n' '  ReportMate-<version>.pkg ReportMate-<version>-signed.pkg'
            printf '%s\n' ''
            printf '%s\n' 'xcrun notarytool submit ReportMate-<version>-signed.pkg \'
            printf '%s\n' '  --apple-id <apple-id> --team-id <TeamID> --password <app-specific-password> --wait'
            printf '%s\n' 'xcrun stapler staple ReportMate-<version>-signed.pkg'
            printf '%s\n' '```'
          } > "$NOTES_FILE"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            gh release create "$TAG" \
              release/ReportMate-*.pkg release/ReportMate-*.pkg.sha256 \
              --target "$GITHUB_SHA" \
              --title "ReportMate $VERSION" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              release/ReportMate-*.pkg release/ReportMate-*.pkg.sha256 \
              --title "ReportMate $VERSION" \
              --notes-file "$NOTES_FILE"
          fi
